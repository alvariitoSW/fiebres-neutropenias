<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUD Clínico UCI</title>
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>

<div class="app-container">
    <div class="header-row">
        <div class="header">
            <h1>HUD Clínico UCI</h1>
            <p>Estratificación de Riesgo // R1</p>
        </div>
        <button class="accordion-btn nav-btn corner-btn" id="btn-escalas-generales">⚡ Escalas</button>
    </div>

    <!-- ========================================== -->
    <!-- MENÚ PRINCIPAL                              -->
    <!-- ========================================== -->
    <div id="home-view">
        <button class="accordion-btn nav-btn" id="btn-citopenias" style="border-left: 4px solid var(--accent-red);">
            <span><span class="hemato-icon">🩸</span>1. MANEJO CITOPENIAS</span>
            <span style="font-size: 0.8rem; color: var(--accent-red);">[ VER → ]</span>
        </button>

        <button class="accordion-btn nav-btn" id="btn-reconocimiento" style="border-left: 4px solid var(--accent-blue);">
            <span><span class="gral-icon" style="color: var(--accent-blue); text-shadow: var(--glow-blue);">🔎</span>2. RECONOCIMIENTO TEMPRANO DEL PACIENTE HEMATOLÓGICO</span>
            <span style="font-size: 0.8rem; color: var(--accent-blue);">[ VER → ]</span>
        </button>

        <button class="accordion-btn nav-btn" id="btn-sindromes" style="border-left: 4px solid var(--accent-yellow);">
            <span><span class="gral-icon" style="color: var(--accent-yellow); text-shadow: none;">🚨</span>3. SÍNDROMES HEMATOLÓGICOS URGENTES</span>
            <span style="font-size: 0.8rem; color: var(--accent-yellow);">[ VER → ]</span>
        </button>

        <button class="accordion-btn nav-btn" id="btn-trasplante" style="border-left: 4px solid var(--accent-purple);">
            <span><span class="gral-icon" style="color: var(--accent-purple); text-shadow: var(--glow-purple);">🧬</span>4. TRASPLANTE DE PROGENITORES HEMATOPOYÉTICOS</span>
            <span style="font-size: 0.8rem; color: var(--accent-purple);">[ VER → ]</span>
        </button>

        <!-- SECCIÓN: FUENTES Y EVIDENCIA -->
        <button class="accordion-btn" data-target="fuentes" style="border-left: 4px solid var(--accent-green); margin-top: 20px;">
            <span><span class="gral-icon" style="color: var(--accent-green); text-shadow: var(--glow-green);">📚</span>FUENTES Y EVIDENCIA</span>
            <span id="fuentes-status" style="font-size: 0.8rem; color: var(--accent-green);">[ ABRIR ]</span>
        </button>
        <div id="fuentes" class="accordion-content" data-include="js/modules/fuentes/fuentes.html"></div>
    </div>

    <!-- ========================================== -->
    <!-- VISTA: ESCALAS GENERALES                    -->
    <!-- ========================================== -->
    <div id="escalas-generales-view" style="display: none;" data-include="js/modules/generales/generales.html"></div>

    <!-- ========================================== -->
    <!-- VISTA: MANEJO CITOPENIAS                    -->
    <!-- ========================================== -->
    <div id="citopenias-view" style="display: none;">
        <div id="citopenias-menu-view" data-include="js/modules/citopenias/citopenias-menu.html"></div>

        <div id="neutropenia-febril-container" style="display: none;">
            <div id="hemato-main-view" data-include="js/modules/neutropenia-febril/main-view.html"></div>
            <div id="hemato-diagnostico-view" style="display: none;" data-include="js/modules/neutropenia-febril/diagnostico-view.html"></div>
            <div id="hemato-tratamiento-view" style="display: none;" data-include="js/modules/neutropenia-febril/tratamiento-empirico-view.html"></div>
            <div id="hemato-dirigido-view" style="display: none;" data-include="js/modules/neutropenia-febril/tratamiento-dirigido-view.html"></div>
            <div id="hemato-microorganismos-view" style="display: none;" data-include="js/modules/neutropenia-febril/microorganismos-view.html"></div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- VISTA: RECONOCIMIENTO TEMPRANO              -->
    <!-- ========================================== -->
    <div id="reconocimiento-view" style="display: none;" data-include="js/modules/reconocimiento/reconocimiento.html"></div>

    <!-- ========================================== -->
    <!-- VISTA: SÍNDROMES HEMATOLÓGICOS URGENTES     -->
    <!-- ========================================== -->
    <div id="sindromes-view" style="display: none;" data-include="js/modules/sindromes-urgentes/sindromes.html"></div>

    <!-- ========================================== -->
    <!-- VISTA: TRASPLANTE DE PROGENITORES           -->
    <!-- ========================================== -->
    <div id="trasplante-view" style="display: none;">
        <div id="trasplante-menu-view" data-include="js/modules/trasplante/trasplante-menu.html"></div>
        <div id="tph-intro-view" style="display: none;" data-include="js/modules/trasplante/introduccion.html"></div>
        <div id="tph-cart-view" style="display: none;" data-include="js/modules/trasplante/car-t.html"></div>
    </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
