<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUD Clínico UCI</title>
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>HUD Clínico UCI</h1>
        <p>Estratificación de Riesgo // R1</p>
    </div>

    <!-- SECCIÓN: ESCALAS GENERALES -->
    <button class="accordion-btn" data-target="generales">
        <span><span class="gral-icon">⚡</span>ESCALAS GENERALES</span>
        <span id="generales-status" style="font-size: 0.8rem; color: var(--accent-blue);">[ ABRIR ]</span>
    </button>

    <div id="generales" class="accordion-content" data-include="js/modules/generales/generales.html"></div>

    <!-- SECCIÓN: NEUTROPENIAS FEBRILES -->
    <button class="accordion-btn" data-target="hemato" style="border-left: 4px solid var(--accent-red);">
        <span><span class="hemato-icon">🩸</span>NEUTROPENIAS FEBRILES</span>
        <span id="hemato-status" style="font-size: 0.8rem; color: var(--accent-red);">[ ABRIR ]</span>
    </button>

    <div id="hemato" class="accordion-content">
        <div id="hemato-main-view" data-include="js/modules/neutropenia-febril/main-view.html"></div>
        <div id="hemato-diagnostico-view" style="display: none;" data-include="js/modules/neutropenia-febril/diagnostico-view.html"></div>
        <div id="hemato-tratamiento-view" style="display: none;" data-include="js/modules/neutropenia-febril/tratamiento-empirico-view.html"></div>
        <div id="hemato-dirigido-view" style="display: none;" data-include="js/modules/neutropenia-febril/tratamiento-dirigido-view.html"></div>
    </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
